<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Style Injector</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #222; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #444; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }
        .full { grid-column: span 2; }
        
        .b-rainbow { background: linear-gradient(45deg, red, blue, green); color: white; }
        .b-neon { background: #39ff14; color: black; }
        .b-dark { background: #444; color: white; }
        .b-tdark { background: #000; color: #555; border: 1px solid #222; }
        .b-white { background: #ddd; color: #333; }
        .b-twhite { background: #fff; color: #000; border: 1px solid #ccc; }
        #msg { margin-top: 15px; color: #39ff14; font-size: 14px; height: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Force Style Injector , Works On F12 Developer Console</h2>
    <div class="grid">
        <button class="b-rainbow full" onclick="copyCode('rainbow')">RAINBOW MODE</button>
        <button class="b-neon" onclick="copyCode('neon')">NEON</button>
        <button class="b-dark" onclick="copyCode('dark')">DARK</button>
        <button class="b-tdark" onclick="copyCode('trueDark')">TRUE DARK</button>
        <button class="b-white" onclick="copyCode('white')">WHITE</button>
        <button class="b-twhite full" onclick="copyCode('trueWhite')">TRUE WHITE</button>
    </div>
    <div id="msg"></div>
</div>

<script>
    function inject(css) {
        return `(function(){
            const s = document.createElement('style');
            s.innerHTML = \`${css}\`;
            document.head.appendChild(s);
            console.log("Injection Complete");
        })();`;
    }

    const presets = {
        // !important на кожному елементі (*) гарантує заміну стилів
        rainbow: inject(`
            * { 
                background: none !important; 
                background-color: #000 !important; 
                border: 2px solid red !important;
                animation: rb 2s infinite linear !important;
            }
            @keyframes rb {
                0% { border-color: red; color: red; }
                33% { border-color: blue; color: blue; }
                66% { border-color: green; color: green; }
                100% { border-color: red; color: red; }
            }
        `),
        neon: inject(`
            * { 
                background-color: #000 !important; 
                color: #39ff14 !important; 
                border-color: #39ff14 !important; 
                text-shadow: 0 0 8px #39ff14 !important;
                box-shadow: inset 0 0 5px #39ff14 !important;
            }
        `),
        dark: inject(`
            * { 
                background-color: #1a1a1a !important; 
                color: #ababab !important; 
                border-color: #333 !important; 
            }
        `),
        trueDark: inject(`
            * { 
                background-color: #000 !important; 
                color: #333 !important; 
                border: 1px solid #111 !important; 
                background-image: none !important;
            }
        `),
        white: inject(`
            * { 
                background-color: #f0f0f0 !important; 
                color: #222 !important; 
                border-color: #ccc !important; 
            }
        `),
        trueWhite: inject(`
            * { 
                background-color: #ffffff !important; 
                color: #000000 !important; 
                border: 1px solid #000 !important;
                background-image: none !important;
            }
        `)
    };

    function copyCode(id) {
        navigator.clipboard.writeText(presets[id]);
        document.getElementById('msg').innerText = id.toUpperCase() + " code copied!";
        setTimeout(() => document.getElementById('msg').innerText = "", 2000);
    }
</script>

</body>
</html>
